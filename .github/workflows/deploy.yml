name: Deploy to cPanel

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v4

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'

    - name: 🔐 Create env file
      run: |
        cat << 'EOF' > .env.local
        ${{ secrets.ENV_FILE }}
        EOF

    - name: 📦 Install dependencies
      run: npm install

    - name: 🏗️ Build Project
      run: npm run build

    - name: 📂 Sync files to cPanel
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        server-dir: /lumasoftswebsite/
        exclude: |
          **/.git*
          **/.git*/**
          node_modules/**

    - name: 🔄 Trigger cPanel Server Restart
      run: |
        mkdir -p ftp-restart
        touch ftp-restart/restart.txt
        
    - name: 🚀 Upload Restart Trigger
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        server-dir: /lumasoftswebsite/tmp/
        local-dir: ./ftp-restart/
